<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>South America — World Flags</title>
  <link rel="stylesheet" href="style.css" />
  <script>(function(){var t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
</head>
<body>

  <header class="site-header continent-page-header">
    <div class="header-inner">
      <a href="index.html" class="back-link">&#8592; World</a>
      <a href="quiz.html" class="quiz-nav-link">&#127922; Quiz</a>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search" placeholder="Search&#8230;" autocomplete="off" spellcheck="false" />
        <span id="clear-btn" class="clear-btn" aria-label="Clear">&#x2715;</span>
      </div>
      <div class="sort-wrap">
        <span class="sort-label" aria-hidden="true">&#x21D5;</span>
        <select id="sort-select" class="sort-select" aria-label="Sort countries">
          <option value="name-asc">Name (A–Z)</option>
          <option value="pop-desc">Most Populous</option>
          <option value="pop-asc">Least Populous</option>
          <option value="area-desc">Largest</option>
          <option value="area-asc">Smallest</option>
        </select>
      </div>
    </div>
  </header>

  <main id="continent-page" data-continent="South America">
    <div class="continent-page-hero">
      <span class="eyebrow">Geographic Atlas</span>
      <h1>South America</h1>
      <p id="count-label" class="count-label"></p>
    </div>
    <div id="country-list" class="country-list-page"></div>
    <div id="empty-state" class="empty-state hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <p>No results for <strong id="empty-query"></strong></p>
    </div>
  </main>

  <footer>
    <p><a href="index.html">&#8592; Back to World</a> &middot; Flag images via <a href="https://flagcdn.com" target="_blank" rel="noopener">flagcdn.com</a></p>
  </footer>

  <script src="script.js"></script>
  <script src="auth.js"></script>
  <script src="chat-widget.js"></script>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">
    <span class="toggle-track">
      <svg class="toggle-icon toggle-icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="12" height="12"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg>
      <svg class="toggle-icon toggle-icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span class="toggle-knob"></span>
    </span>
  </button>
</body>
</html>
